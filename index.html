<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>to my sweet wittle bunny kimmy</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Great+Vibes&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="slideshow-container">
    <!-- Slide 1: Intro -->
    <div class="slide fade">
      <img src="https://wallpapers.com/images/hd/pink-hello-kitty-heart-with-wings-c7i37gbye6akpu1u.jpg" alt="Hello Kitty heart wings">
      <div class="text-overlay">
        <h1>my baby</h1>
        <p class="subtitle">HAPPY WOMENS DAY! 💞</p>
      </div>
    </div>

    <!-- Slide 2: Strong & Beautiful -->
    <div class="slide fade">
      <img src="https://wallpapers.com/images/featured/cute-pink-hello-kitty-7479l81o21tk9oko.jpg" alt="Pink Hello Kitty bow">
      <div class="text-overlay">
        <h2>Super duper cute</h2>
        <p>You light up my world every day kimmy</p>
      </div>
    </div>

    <!-- Slide 3: Kind Heart -->
    <div class="slide fade">
      <img src="https://4kwallpapers.com/images/wallpapers/hello-kitty-minimal-2880x1800-9938.png" alt="Minimal Hello Kitty bow">
      <div class="text-overlay">
        <h2>nice kitty</h2>
        <p>its pretty lowki</p>
      </div>
    </div>

    <!-- Slide 4: My Favorite -->
    <div class="slide fade">
      <img src="https://wallpapers-clan.com/wp-content/uploads/2024/11/pink-and-cute-hello-kitty-desktop-wallpaper-cover.jpg" alt="Pink Hello Kitty aesthetic">
      <div class="text-overlay">
        <h2>My Everything</h2>
        <p>smart, funny, beautiful my favourite wittle girl</p>
      </div>
    </div>

    <!-- Slide 5: End / Love Note -->
    <div class="slide fade">
      <img src="https://images.alphacoders.com/133/1339211.png" alt="Hello Kitty with flowers">
      <div class="text-overlay end">
        <h1>i love you kimmy</h1>
        <p>Youure my queen kimmy, forever and always 🎀</p>
      </div>
    </div>

    <!-- Navigation dots -->
    <div class="dots">
      <span class="dot" onclick="currentSlide(1)"></span>
      <span class="dot" onclick="currentSlide(2)"></span>
      <span class="dot" onclick="currentSlide(3)"></span>
      <span class="dot" onclick="currentSlide(4)"></span>
      <span class="dot" onclick="currentSlide(5)"></span>
    </div>
  </div>

  <!-- Floating kawaii elements -->
  <div class="hearts">
    <div class="heart" style="left:10%; animation-delay:0s;">💖</div>
    <div class="heart" style="left:25%; animation-delay:1.5s;">🎀</div>
    <div class="heart" style="left:40%; animation-delay:3s;">🐱</div>
    <div class="heart" style="left:55%; animation-delay:0.5s;">💕</div>
    <div class="heart" style="left:70%; animation-delay:4s;">✨</div>
    <div class="heart" style="left:85%; animation-delay:2s;">🌸</div>
  </div>

  <script src="script.js"></script>
</body>
</html>
